name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Use go-version-file so the toolchain in go.mod stays the source
          # of truth; setup-go honors both `go` and `toolchain` directives.
          go-version-file: go.mod
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Build
        run: make build

      - name: Vet
        run: make vet

      - name: Unit tests
        run: make test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        # v7 of the action pulls golangci-lint v2.x (built with newer Go).
        # v6 was pinning v1.64.x which was built with go1.24 and rejects
        # modules whose `go` directive is >= 1.25.
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.0.2
