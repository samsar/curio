name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Use go-version-file so the toolchain in go.mod stays the source
          # of truth; setup-go honors both `go` and `toolchain` directives.
          go-version-file: go.mod
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Build
        run: make build

      - name: Vet
        run: make vet

      - name: Unit tests
        run: make test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        # Pin a recent v2.x — older v2 releases (v2.0.x) were built with
        # Go 1.24 and reject modules whose `go` directive is ≥ 1.25.
        # Multiple deps (pressly/goose, html-to-markdown, ...) require
        # 1.25, so we need a lint binary built against ≥1.25 too.
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
